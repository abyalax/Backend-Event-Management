services:
  minio:
    image: minio/minio:latest
    container_name: event_management_minio_server
    restart: no
    hostname: minio
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
      # Performance tuning
      MINIO_API_MAX_CONCURRENT_STREAMS: 16
      MINIO_CLUSTER_REPLICATION_ENABLED: "true"
    volumes:
      - minio_data:/data
      - ./minio/certs:/root/.minio/certs:ro  # For SSL (optional)
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 5s
    networks:
      - storage_network
    labels:
      - "com.example.description=MinIO Object Storage"

  # MinIO Client (mc) - For bucket creation and management
  minio_mc:
    image: minio/mc:latest
    container_name: event_management_minio_mc
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_minio: http://${MINIO_ACCESS_KEY:-minioadmin}:${MINIO_SECRET_KEY:-minioadmin}@minio:9000
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh
      - ./minio/policy.json:/policy.json
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      
      # Create buckets
      mc mb minio/documents || true;
      mc mb minio/images || true;
      mc mb minio/documents-public || true;
      mc mb minio/images-public || true;
      mc mb minio/tickets-public || true;
      mc mb minio/backups || true;
      mc mb minio/videos || true;
      
      # Set bucket versioning
      mc version enable minio/backups;
      
      # Set public read policy for images-public bucket
      mc anonymous set public minio/images-public || true;

      # Set public read policy for documents-public bucket
      mc anonymous set public minio/documents-public || true;

      # Set public read policy for documents-public bucket
      mc anonymous set public minio/tickets-public || true;
      
      # Set bucket lifecycle for automatic cleanup
      mc ilm import minio/backups < /dev/null || true;
      
      echo 'Buckets initialized successfully';
      "
    networks:
      - storage_network

  postgres:
    image: postgres:16
    container_name: event_management_postgres
    restart: no
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgress_pass}
      POSTGRES_DB: ${POSTGRES_DB:-db_event_management}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - storage_network

  redis:
    image: redis:7-alpine
    container_name: event_management_redis
    restart: no
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    networks:
      - storage_network
  
  mailpit:
    image: axllent/mailpit:latest
    container_name: event_management_mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      - MP_MAX_MESSAGES=${MAILPIT_MAX_MESSAGES:-1000}
      - MP_SMTP_AUTH_ACCEPT_ANY=${MAILPIT_SMTP_AUTH_ACCEPT_ANY:-true}
      - MP_SMTP_AUTH_USERNAME=${MAILPIT_USER:-evenic-mailpit}
      - MP_SMTP_AUTH_PASSWORD=${MAILPIT_PASSWORD:-evenic-mailpit}
      - MP_OUTGOING_HOST=${MAILPIT_HOST:-localhost}
      - MP_OUTGOING_PORT=${MAILPIT_PORT:-1025}
      - MP_OUTGOING_SECURE=${MAILPIT_SECURE:-false}
      - MP_DEFAULT_FROM_EMAIL=${MAILPIT_FROM_EMAIL:-evenics@vest.com}
      - MP_DEFAULT_FROM_NAME=${MAILPIT_FROM_NAME:-Evenics}
    volumes:
      - mailpit_data:/var/lib/mailpit/data
    command: ["--smtp-auth-allow-insecure"]
    networks:
      - storage_network

  dbgate:
    image: dbgate/dbgate
    container_name: event_management_dbms
    restart: no
    depends_on: 
      - postgres
    ports:
      - 8080:3000
    volumes:
      - dbgate-data:/root/.dbgate
    networks:
          - storage_network
    environment:
      PORT: 3000
      CONNECTIONS: POSTGRES
      LABEL_POSTGRES: Postgres
      SERVER_POSTGRES: postgres
      USER_POSTGRES: root
      PASSWORD_POSTGRES: postgress_pass
      PORT_POSTGRES: 5432
      ENGINE_POSTGRES: postgres@dbgate-plugin-postgres
      DATABASE_POSTGRES: db_event_management

networks:
  storage_network:
    driver: bridge

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  dbgate-data:
    driver: local
  mailpit_data:
    driver: local

# Usage:
# 1. Create .env file dengan required variables
# 2. Run: docker-compose up -d
# 3. Access MinIO Console: http://localhost:9001
# 4. Access Mailpit: http://localhost:8025
# 5. Access DBMS: http://localhost:8080
# 6. Access PostgreSQL: localhost:5433
# 7. Access Redis: localhost:6379
#
# Helpful commands:
# - View logs: docker-compose logs -f
# - Stop all: docker-compose down
# - Remove volumes: docker-compose down -v
# - Rebuild: docker-compose up --build

