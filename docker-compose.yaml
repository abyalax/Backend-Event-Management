  #  mailpit:
  #   image: axllent/mailpit:latest
  #   container_name: mailpit_nuxt
  #   ports:
  #     - "${MAILPIT_SMTP_PORT}:1025"
  #     - "${MAILPIT_UI_PORT}:8025"
  #   environment:
  #     - MP_MAX_MESSAGES=${MAILPIT_MAX_MESSAGES}
  #     - MP_SMTP_AUTH_ACCEPT_ANY=${MAILPIT_SMTP_AUTH_ACCEPT_ANY}
  #   volumes:
  #     - mailpit_data:/var/lib/mailpit/data

  dbgate:
    image: dbgate/dbgate
    restart: always
    ports:
      - 8080:3000
    volumes:
      - dbgate-data:/root/.dbgate
    environment:
      CONNECTIONS: POSTGRES

      LABEL_POSTGRES: Postgres
      SERVER_POSTGRES: postgres
      USER_POSTGRES: root
      PASSWORD_POSTGRES: postgress_pass
      PORT_POSTGRES: 5432
      ENGINE_POSTGRES: postgres@dbgate-plugin-postgres
      DATABASE_POSTGRES: db_event_management

volumes:
  postgres_data:
  redis_data:
  minio_data:
  dbgate-data:
