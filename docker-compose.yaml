services:
  # MinIO - Object Storage Server
  minio:
    image: minio/minio:latest
    container_name: minio_server
    hostname: minio
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
      # Performance tuning
      MINIO_API_MAX_CONCURRENT_STREAMS: 16
      MINIO_CLUSTER_REPLICATION_ENABLED: "true"
    volumes:
      - minio_data:/data
      - ./minio/certs:/root/.minio/certs:ro  # For SSL (optional)
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - storage_network
    labels:
      - "com.example.description=MinIO Object Storage"

  # MinIO Client (mc) - For bucket creation and management
  minio_mc:
    image: minio/mc:latest
    container_name: minio_mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_minio: http://${MINIO_ACCESS_KEY:-minioadmin}:${MINIO_SECRET_KEY:-minioadmin}@minio:9000
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh
      - ./minio/policy.json:/policy.json
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      
      # Create buckets
      mc mb minio/documents || true;
      mc mb minio/images || true;
      mc mb minio/backups || true;
      mc mb minio/videos || true;
      
      # Set bucket versioning
      mc version enable minio/backups;
      
      # Set bucket lifecycle for automatic cleanup
      mc ilm import minio/backups < /dev/null || true;
      
      echo 'Buckets initialized successfully';
      "
    networks:
      - storage_network
    restart: on-failure

  # PostgreSQL - For application data (optional)
  postgres:
    image: postgres:16
    container_name: object_storage_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: postgress_pass
      POSTGRES_DB: db_event_management
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: object_storage_redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    command: redis-server --requirepass redis_password

networks:
  storage_network:
    driver: bridge

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  dbgate-data:
    driver: local

# Usage:
# 1. Create .env file dengan required variables
# 2. Run: docker-compose up -d
# 3. Access MinIO Console: http://localhost:9001
# 4. Access Application: http://localhost:3000
# 5. Access PostgreSQL: localhost:5432
# 6. Access Redis: localhost:6379
#
# Helpful commands:
# - View logs: docker-compose logs -f
# - Stop all: docker-compose down
# - Remove volumes: docker-compose down -v
# - Rebuild: docker-compose up --build

